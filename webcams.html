<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Webcams – Forgeron Weather</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

  <link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{
  margin:0;
  padding:20px;
  background:#020617;
  color:#e5e7eb;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}

h1{
  text-align:center;
  margin-bottom:6px;
}

.sub{
  text-align:center;
  color:#9ca3af;
  margin-bottom:20px;
}

.card{
  max-width:900px;
  margin:0 auto;
  background:#0b1220;
  border-radius:14px;
  padding:18px;
  box-shadow:0 0 40px rgba(56,189,248,.25);
}

select{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  background:#020617;
  color:#9ca3af;
  border:1px solid rgba(255,255,255,.15);
  border-radius:8px;
  font-size:14px;
}

#camBox{
  margin-top:18px;
}

.camTitle{
  font-weight:600;
  margin-bottom:10px;
}

.camFrame{
  width:100%;
  border-radius:12px;
  box-shadow:0 0 25px rgba(56,189,248,.35);
}

.footer{
  text-align:center;
  margin-top:30px;
  color:#64748b;
  font-size:12px;
}
.camFilter{
  background:#0b1220;
  color:#38bdf8;
  border:1px solid #38bdf8;
  padding:6px 12px;
  margin:0 6px;
  border-radius:20px;
  cursor:pointer;
  font-size:13px;
}

.camFilter:hover{
  background:#38bdf8;
  color:#020617;
}  
</style>

</head>



<body>

<h1>Webcams</h1>
<div style="
  text-align:center;
  margin:6px 0 18px;
  color:#facc15;
  font-size:13px;
  letter-spacing:.04em;
  opacity:.85;
">
🚧 UNDER CONSTRUCTION — more cameras coming soon
</div>
<div class="card">
  <h2 style="margin-top:0;">🗺 Live Camera Network</h2>
  <div style="margin-bottom:12px;text-align:center;">
  <button onclick="setFilter('all')" class="camFilter">All</button>
  <button onclick="setFilter('coastal')" class="camFilter">Coastal</button>
  <button onclick="setFilter('mountain')" class="camFilter">Mountain</button>
  <button onclick="setFilter('city')" class="camFilter">City</button>
</div>
  <div id="map" style="height:500px;border-radius:14px;"></div>
</div>

<div class="card" style="margin-top:24px;">
  <div id="camBox" style="text-align:center;">
    <div style="color:#94a3b8">
      Click a camera marker on the map
    </div>
  </div>
</div>
<script>

const webcams = [
  // 🌊 COASTAL

  {
    name: "Yaquina Bay – Newport, OR",
    lat: 44.62,
    lon: -124.05,
    type: "coastal",
    source: "iframe",
    url: "https://ipcamlive.com/player/player.php?alias=yaquinabaybridge"
  },


  // 🏔 MOUNTAIN

  {
    name: "Timberline Lodge – Mt Hood, OR",
    lat: 45.33,
    lon: -121.71,
    type: "mountain",
    source: "image",
    url: "https://timberlinelodge.com/snowcameras/lodge.jpg"
  },

   //  City 
  
    {
    name: "Portland Downtown – OR",
    lat: 45.5231,
    lon: -122.6765,
    type: "city",
    source: "image",
    url: "https://webpubcontent.gray.tv/kptv/cams/shriners.jpg"
  },

  {
    name: "Seaside – OR",
    lat: 45.9932,
    lon: -123.9226,
    type: "coastal",
    source: "image",
    url: "https://webpubcontent.gray.tv/kptv/cams/Seaside.jpg"
  },

    {
    name: "Florence – OR",
    lat: 43.9828,
    lon: -124.1095,
    type: "coastal",
    source: "image",
    url: "https://ftp2.kezi.com/kezi_cams/original7.jpg"
  },

  {
    name: "Eugene – OR",
    lat: 44.0521,
    lon: -123.0868,
    type: "city",
    source: "image",
    url: "https://images.weatherstem.com/skycamera/lane/uo/cumulus/snapshot.jpg"
  },
    {
    name: "Joseph – OR",
    lat: 45.3298,
    lon: -117.2274,
    type: "city",
    source: "image",
    url: "https://www.josephoregonweather.com/josephwxcam.jpg"
  },
  {
    name: "Sunriver – OR",
    lat: 43.8659,
    lon: -121.4122,
    type: "city",
    source: "image",
    url: "https://portlandweather.com/assets/images/cameras/SunriverCam.jpeg"
  },
  {
    name: "Mt St. Helens – WA",
    lat: 46.1912,
    lon: -122.1944,
    type: "mountain",
    source: "image",
    url: "https://volcanoes.usgs.gov/vsc/captures/st_helens/jro-webcam.jpg"
  },
  {
    name: "Seattle – Lumen Field, WA",
    lat: 47.5952,
    lon: -122.3316,
    type: "city",
    source: "image",
    url: "https://komonews.com/resources/ftptransfer/komo/maps/ColumbiaCam.jpg"
  },
  {
    name: "Snoqualmie Pass – WA",
    lat: 47.4278,
    lon: -121.4186,
    type: "mountain",
    source: "image",
    url: "https://komonews.com/resources/ftptransfer/komo/maps/Snoqualmie_ski_cam.jpg"
  },
  {
    name: "Seattle Waterfront – WA",
    lat: 47.6053,
    lon: -122.3381,
    type: "city",
    source: "image",
    url: "https://komonews.com/resources/ftptransfer/komo/maps/Seattle_Cam_BigFish.jpg"
  },
  {
    name: "SeaTac Tower – WA",
    lat: 47.4490,
    lon: -122.3094,
    type: "city",
    source: "image",
    url: "https://komonews.com/resources/ftptransfer/komo/maps/SeaTac_Tower_Cam.jpg"
  },
    {
    name: "Mammoth Mountain – CA",
    lat: 37.6308,
    lon: -119.0326,
    type: "mountain",
    source: "image",
    url: "https://media.mammothresorts.com/mmsa/mammoth/cams/Village_Village_1280x720.jpg"
  }
  {
    name: "Yosemite – Half Dome, CA",
    lat: 37.7460,
    lon: -119.5320,
    type: "mountain",
    source: "image",
    url: "https://cdn.pixelcaster.com/public.pixelcaster.com/snapshots/yosemite-halfdome/latest.jpg"
  },
  {
    name: "Yosemite – El Capitan/Turtleback, CA",
    lat: 37.7338,
    lon: -119.6374,
    type: "mountain",
    source: "image",
    url: "https://cdn.pixelcaster.com/public.pixelcaster.com/snapshots/yosemite-turtleback/latest.jpg"
  },
    
  {
    name: "Yosemite Falls – CA",
    lat: 37.7578,
    lon: -119.5966,
    type: "mountain",
    source: "image",
    url: "https://cdn.pixelcaster.com/public.pixelcaster.com/snapshots/yosemite-yosfalls/latest.jpg"
  }
];





const camBox = document.getElementById("camBox");

// Create map
const map = L.map('map').setView([39.5, -98.35], 4);

// Add map tiles
L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  {
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
    opacity: 0.75
  }
).addTo(map);

// Add markers
let activeMarker = null;  
let markers = [];
let currentFilter = "all";

function renderMarkers(){

  // Remove old markers
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  webcams.forEach(cam => {

    if(currentFilter !== "all" && cam.type !== currentFilter){
      return;
    }

    const marker = L.circleMarker(
      [cam.lat, cam.lon],
      {
        radius: 9,
        color: "#38bdf8",
        fillColor: "#38bdf8",
        fillOpacity: 1,
        weight: 2
      }
    ).addTo(map);

    marker.on("click", () => {

      if(activeMarker){
        activeMarker.setStyle({ radius: 9 });
      }

      marker.setStyle({ radius: 13 });
      activeMarker = marker;

      map.setView([cam.lat, cam.lon], 8);
      loadCamera(cam);
    });

    markers.push(marker);
  });
}

function setFilter(type){
  currentFilter = type;
  renderMarkers();
}

renderMarkers();

function loadCamera(cam){

  if(cam.source === "iframe"){
    camBox.innerHTML = `
      <div class="camTitle">${cam.name}</div>
      <iframe src="${cam.url}"
        style="width:100%;height:450px;border-radius:12px;border:none;">
      </iframe>
    `;
  }

  else if(cam.source === "image"){
    camBox.innerHTML = `
      <div class="camTitle">${cam.name}</div>
      <img class="camFrame" src="${cam.url}?t=${Date.now()}">
    `;
  }

  else if(cam.source === "link"){
    camBox.innerHTML = `
      <div class="camTitle">${cam.name}</div>
      <div style="margin-top:20px;">
        <a href="${cam.url}" target="_blank" style="
          display:inline-block;
          padding:12px 20px;
          background:#38bdf8;
          color:#020617;
          border-radius:8px;
          font-weight:600;
          text-decoration:none;
        ">
          Open Live Camera →
        </a>
      </div>
    `;
  }
}

</script>

<div class="footer">
← <a href="index.html" style="color:#38bdf8">Back to Dashboard</a>
</div>

</body>
</html>
