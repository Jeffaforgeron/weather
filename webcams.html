<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Webcams – Forgeron Weather</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

  <link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{
  margin:0;
  padding:20px;
  background:#020617;
  color:#e5e7eb;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}

h1{
  text-align:center;
  margin-bottom:6px;
}

.sub{
  text-align:center;
  color:#9ca3af;
  margin-bottom:20px;
}

.card{
  max-width:900px;
  margin:0 auto;
  background:#0b1220;
  border-radius:14px;
  padding:18px;
  box-shadow:0 0 40px rgba(56,189,248,.25);
}

select{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  background:#020617;
  color:#9ca3af;
  border:1px solid rgba(255,255,255,.15);
  border-radius:8px;
  font-size:14px;
}

#camBox{
  margin-top:18px;
}

.camTitle{
  font-weight:600;
  margin-bottom:10px;
}

.camFrame{
  width:100%;
  border-radius:12px;
  box-shadow:0 0 25px rgba(56,189,248,.35);
}

.footer{
  text-align:center;
  margin-top:30px;
  color:#64748b;
  font-size:12px;
}
</style>

</head>



<body>

<h1>Webcams</h1>
<div style="
  text-align:center;
  margin:6px 0 18px;
  color:#facc15;
  font-size:13px;
  letter-spacing:.04em;
  opacity:.85;
">
🚧 UNDER CONSTRUCTION — cameras coming soon
</div>
<div class="card">
  <h2 style="margin-top:0;">🗺 Live Camera Network</h2>
  <div id="map" style="height:500px;border-radius:14px;"></div>
</div>

<div class="card" style="margin-top:24px;">
  <div id="camBox" style="text-align:center;">
    <div style="color:#94a3b8">
      Click a camera marker on the map
    </div>
  </div>
</div>
<script>

const webcams = [
  {
    name: "Yaquina Bay – Newport, OR",
    lat: 44.62,
    lon: -124.05,
    source: "iframe",
    url: "https://ipcamlive.com/player/player.php?alias=yaquinabaybridge"
  },
  {
    name: "Timberline Lodge – Mt Hood, OR",
    lat: 45.33,
    lon: -121.71,
    source: "image",
    url: "https://timberlinelodge.com/snowcameras/lodge.jpg"
  }
];

const camBox = document.getElementById("camBox");

// Create map
const map = L.map('map').setView([39.5, -98.35], 4);

// Add map tiles
L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  {
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
  }
).addTo(map);

// Add markers
webcams.forEach(cam => {

  const marker = L.circleMarker(
    [cam.lat, cam.lon],
    {
      radius: 9,
color: "#38bdf8",
fillColor: "#38bdf8",
fillOpacity: 1,
weight: 2
    }
  ).addTo(map);

  marker.on("click", () => {
  map.setView([cam.lat, cam.lon], 8);
  loadCamera(cam);
});
});

function loadCamera(cam){

  if(cam.source === "iframe"){
    camBox.innerHTML = `
      <div class="camTitle">${cam.name}</div>
      <iframe src="${cam.url}"
        style="width:100%;height:450px;border-radius:12px;border:none;">
      </iframe>
    `;
  }

  if(cam.source === "image"){
    camBox.innerHTML = `
      <div class="camTitle">${cam.name}</div>
      <img class="camFrame" src="${cam.url}?t=${Date.now()}">
    `;
  }
}

</script>

<div class="footer">
← <a href="index.html" style="color:#38bdf8">Back to Dashboard</a>
</div>

</body>
</html>
