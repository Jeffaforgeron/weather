<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Webcams – Forgeron Weather</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

  <link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{
  margin:0;
  padding:20px;
  background:#020617;
  color:#e5e7eb;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}

h1{
  text-align:center;
  margin-bottom:6px;
}

.sub{
  text-align:center;
  color:#9ca3af;
  margin-bottom:20px;
}

.card{
  max-width:900px;
  margin:0 auto;
  background:#0b1220;
  border-radius:14px;
  padding:18px;
  box-shadow:0 0 40px rgba(56,189,248,.25);
}

select{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  background:#020617;
  color:#9ca3af;
  border:1px solid rgba(255,255,255,.15);
  border-radius:8px;
  font-size:14px;
}

#camBox{
  margin-top:18px;
}

.camTitle{
  font-weight:600;
  margin-bottom:10px;
}

.camFrame{
  width:100%;
  border-radius:12px;
  box-shadow:0 0 25px rgba(56,189,248,.35);
}

.footer{
  text-align:center;
  margin-top:30px;
  color:#64748b;
  font-size:12px;
}
.camFilter{
  background:#0b1220;
  color:#38bdf8;
  border:1px solid #38bdf8;
  padding:6px 12px;
  margin:0 6px;
  border-radius:20px;
  cursor:pointer;
  font-size:13px;
}

.camFilter:hover{
  background:#38bdf8;
  color:#020617;
}  
</style>

</head>



<body>

<h1>Webcams</h1>
<div style="
  text-align:center;
  margin:6px 0 18px;
  color:#facc15;
  font-size:13px;
  letter-spacing:.04em;
  opacity:.85;
">
🚧 UNDER CONSTRUCTION — cameras coming soon
</div>
<div class="card">
  <h2 style="margin-top:0;">🗺 Live Camera Network</h2>
  <div style="margin-bottom:12px;text-align:center;">
  <button onclick="setFilter('all')" class="camFilter">All</button>
  <button onclick="setFilter('coastal')" class="camFilter">Coastal</button>
  <button onclick="setFilter('mountain')" class="camFilter">Mountain</button>
  <button onclick="setFilter('city')" class="camFilter">City</button>
</div>
  <div id="map" style="height:500px;border-radius:14px;"></div>
</div>

<div class="card" style="margin-top:24px;">
  <div id="camBox" style="text-align:center;">
    <div style="color:#94a3b8">
      Click a camera marker on the map
    </div>
  </div>
</div>
<script>

const webcams = [
  {
    name: "Yaquina Bay – Newport, OR",
    lat: 44.62,
    lon: -124.05,
    type: "coastal",
    source: "iframe",
    url: "https://ipcamlive.com/player/player.php?alias=yaquinabaybridge"
  },
  {
    name: "Timberline Lodge – Mt Hood, OR",
    lat: 45.33,
    lon: -121.71,
    type: "mountain",
    source: "image",
    url: "https://timberlinelodge.com/snowcameras/lodge.jpg"
  }
    // 🌊 COASTAL

  {
    name: "Seattle Waterfront – WA",
    lat: 47.6062,
    lon: -122.3321,
    type: "coastal",
    source: "link",
    url: "https://www.portseattle.org/page/webcams"
  },

  {
    name: "San Francisco Bay – CA",
    lat: 37.8080,
    lon: -122.4177,
    type: "coastal",
    source: "link",
    url: "https://www.portofsanfrancisco.com/cameras"
  },

  {
    name: "Santa Monica Pier – CA",
    lat: 34.0094,
    lon: -118.4973,
    type: "coastal",
    source: "link",
    url: "https://santamonicapier.org/live-cam/"
  },

  {
    name: "Miami Beach – FL",
    lat: 25.7907,
    lon: -80.1300,
    type: "coastal",
    source: "link",
    url: "https://www.miamiandbeaches.com/plan-your-trip/miami-webcams"
  },

  {
    name: "Chicago Lakefront – IL",
    lat: 41.8827,
    lon: -87.6233,
    type: "coastal",
    source: "link",
    url: "https://www.chicagoharbors.info/harbor-cams/"
  },

  // 🏔 MOUNTAIN

  {
    name: "Mammoth Mountain – CA",
    lat: 37.6308,
    lon: -119.0326,
    type: "mountain",
    source: "link",
    url: "https://www.mammothmountain.com/on-the-mountain/mammoth-webcam"
  },

  {
    name: "Aspen Snowmass – CO",
    lat: 39.1911,
    lon: -106.8175,
    type: "mountain",
    source: "link",
    url: "https://www.aspensnowmass.com/mountain-cams"
  },

  {
    name: "Vail Mountain – CO",
    lat: 39.6403,
    lon: -106.3742,
    type: "link",
    source: "link",
    url: "https://www.vail.com/the-mountain/mountain-conditions/mountain-cams.aspx"
  },

  {
    name: "Lake Tahoe – CA",
    lat: 39.0968,
    lon: -120.0324,
    type: "mountain",
    source: "link",
    url: "https://www.tahoetopia.com/webcams"
  },

  // 🏙 CITY

  {
    name: "NYC Skyline – NY",
    lat: 40.7128,
    lon: -74.0060,
    type: "city",
    source: "link",
    url: "https://www.earthcam.com/usa/newyork/timessquare/"
  },

  {
    name: "Denver Skyline – CO",
    lat: 39.7392,
    lon: -104.9903,
    type: "city",
    source: "link",
    url: "https://www.denvergov.org/Government/Agencies-Departments-Offices/Agencies-Departments-Offices-Directory/Parks-Recreation/Parks/City-Park-Webcam"
  },

  {
    name: "Boston Harbor – MA",
    lat: 42.3601,
    lon: -71.0589,
    type: "city",
    source: "link",
    url: "https://www.massport.com/logan-airport/about-logan/webcams/"
  }

];

const camBox = document.getElementById("camBox");

// Create map
const map = L.map('map').setView([39.5, -98.35], 4);

// Add map tiles
L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  {
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
    opacity: 0.75
  }
).addTo(map);

// Add markers
let markers = [];
let currentFilter = "all";

function renderMarkers(){

  // Remove old markers
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  webcams.forEach(cam => {

    if(currentFilter !== "all" && cam.type !== currentFilter){
      return;
    }

    const marker = L.circleMarker(
      [cam.lat, cam.lon],
      {
        radius: 9,
        color: "#38bdf8",
        fillColor: "#38bdf8",
        fillOpacity: 1,
        weight: 2
      }
    ).addTo(map);

    marker.on("click", () => {

      if(activeMarker){
        activeMarker.setStyle({ radius: 9 });
      }

      marker.setStyle({ radius: 13 });
      activeMarker = marker;

      map.setView([cam.lat, cam.lon], 8);
      loadCamera(cam);
    });

    markers.push(marker);
  });
}

function setFilter(type){
  currentFilter = type;
  renderMarkers();
}

renderMarkers();

function loadCamera(cam){

  if(cam.source === "iframe"){
    camBox.innerHTML = `
      <div class="camTitle">${cam.name}</div>
      <iframe src="${cam.url}"
        style="width:100%;height:450px;border-radius:12px;border:none;">
      </iframe>
    `;
  }

  if(cam.source === "image"){
    camBox.innerHTML = `
      <div class="camTitle">${cam.name}</div>
      <img class="camFrame" src="${cam.url}?t=${Date.now()}">
    `;
  }
}

</script>

<div class="footer">
← <a href="index.html" style="color:#38bdf8">Back to Dashboard</a>
</div>

</body>
</html>
